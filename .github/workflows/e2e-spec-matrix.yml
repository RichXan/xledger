name: E2E Spec Matrix

on:
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - "deploy/**"
      - "e2e-tests/**"
      - ".github/workflows/e2e-spec-matrix.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - "deploy/**"
      - "e2e-tests/**"
      - ".github/workflows/e2e-spec-matrix.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-by-spec:
    name: "e2e (${{ matrix.spec }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - spec: accounts
            script: e2e:accounts
          - spec: account-ledger
            script: e2e:account-ledger
          - spec: transactions
            script: e2e:transactions
          - spec: transfer
            script: e2e:transfer
          - spec: reporting
            script: e2e:reporting
          - spec: classification
            script: e2e:classification
          - spec: pat
            script: e2e:pat

    env:
      CI: "true"
      E2E_BASE_URL: http://127.0.0.1:4173
      E2E_API_BASE_URL: http://127.0.0.1:8080/api
      POSTGRES_IMAGE: postgres:16-alpine
      REDIS_IMAGE: redis:7-alpine
      GOLANG_IMAGE: golang:1.22-alpine
      NODE_IMAGE: node:20-alpine
      NGINX_IMAGE: nginx:1.27-alpine
      BACKEND_CONFIG_FILE: ../backend/config/config.yaml.example

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: e2e-tests/pnpm-lock.yaml

      - name: Install e2e dependencies
        working-directory: e2e-tests
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Start deploy stack
        working-directory: deploy
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null && curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              echo "Services are ready"
              exit 0
            fi
            echo "Waiting for services... (${i}/60)"
            sleep 5
          done
          echo "Service startup timed out"
          docker compose -f deploy/docker-compose.yaml ps
          docker compose -f deploy/docker-compose.yaml logs --tail=200
          exit 1

      - name: Run e2e spec
        working-directory: e2e-tests
        run: pnpm run ${{ matrix.script }}

      - name: Dump deploy logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yaml logs --tail=300

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.spec }}-artifacts
          path: |
            e2e-tests/playwright-report
            e2e-tests/test-results
            e2e-tests/midscene_run/report
            e2e-tests/midscene_run/log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop deploy stack
        if: always()
        working-directory: deploy
        run: docker compose down -v
