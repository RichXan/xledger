openapi: 3.1.0
info:
  title: Xledger Backend API
  version: v1.0.0
  description: Xledger 鏅鸿兘涓汉璐㈠姟绠＄悊骞冲彴 API
servers:
  - url: /api
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    PATAuth:
      type: http
      scheme: bearer
      bearerFormat: "pat:{user_id}:{random}"
  schemas:
    Envelope:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: 鎴愬姛
        data:
          nullable: true
    PaginatedEnvelope:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: 鎴愬姛
        data:
          type: object
          required: [items, pagination]
          properties:
            items:
              type: array
              items: {}
            pagination:
              $ref: '#/components/schemas/Pagination'
    Pagination:
      type: object
      required: [page, page_size, total, total_pages]
      properties:
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        total_pages:
          type: integer
          example: 5
    User:
      type: object
      required: [id, email, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
    TokenPair:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    Ledger:
      type: object
      required: [id, user_id, name, is_default]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          example: Default ledger
        is_default:
          type: boolean
    Account:
      type: object
      required: [id, user_id, name, type, initial_balance]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          example: Bank account
        type:
          type: string
          enum: [debit, credit, cash, ewallet]
          example: debit
        initial_balance:
          type: number
          format: double
          example: 10000.00
        archived_at:
          type: string
          format: date-time
          nullable: true
    Transaction:
      type: object
      required: [id, user_id, ledger_id, type, amount, version, occurred_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        ledger_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
          nullable: true
        category_id:
          type: string
          format: uuid
          nullable: true
        category_name:
          type: string
          nullable: true
        from_account_id:
          type: string
          format: uuid
          nullable: true
        to_account_id:
          type: string
          format: uuid
          nullable: true
        transfer_pair_id:
          type: string
          format: uuid
          nullable: true
        transfer_side:
          type: string
          enum: [from, to]
          nullable: true
        version:
          type: integer
        type:
          type: string
          enum: [income, expense, transfer]
        amount:
          type: number
          format: double
        occurred_at:
          type: string
          format: date-time
    TransactionReviewSummary:
      type: object
      required: [review, uncategorized, duplicates, large]
      properties:
        review:
          type: integer
          example: 4
        uncategorized:
          type: integer
          example: 1
        duplicates:
          type: integer
          example: 1
        large:
          type: integer
          example: 1
    TransactionReviewItem:
      type: object
      required: [transaction, reasons]
      properties:
        transaction:
          $ref: '#/components/schemas/Transaction'
        reasons:
          type: array
          items:
            type: string
            enum: [uncategorized, duplicate, large]
    Category:
      type: object
      required: [id, user_id, name]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          example: 椁愰ギ
        parent_id:
          type: string
          format: uuid
          nullable: true
        archived_at:
          type: string
          format: date-time
          nullable: true
    Tag:
      type: object
      required: [id, user_id, name]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          example: 鏈堝害
    OverviewStats:
      type: object
      required: [total_assets, income, expense, net]
      properties:
        total_assets:
          type: number
          format: double
          example: 50000.00
        income:
          type: number
          format: double
          example: 15000.00
        expense:
          type: number
          format: double
          example: 8000.00
        net:
          type: number
          format: double
          example: 7000.00
    TrendDataPoint:
      type: object
      required: [date, income, expense]
      properties:
        date:
          type: string
          format: date
        income:
          type: number
          format: double
        expense:
          type: number
          format: double
    CategoryStatsItem:
      type: object
      required: [category_id, category_name, total_amount, transaction_count]
      properties:
        category_id:
          type: string
          format: uuid
        category_name:
          type: string
        total_amount:
          type: number
          format: double
        transaction_count:
          type: integer
    PAT:
      type: object
      required: [id, name, created_at, expires_at]
      properties:
        id:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
    ImportPreviewResult:
      type: object
      required: [columns, sample_rows, row_count]
      properties:
        columns:
          type: array
          items:
            type: string
        sample_rows:
          type: array
          items:
            type: object
        row_count:
          type: integer
    ImportConfirmResult:
      type: object
      required: [success_count, skip_count, fail_count]
      properties:
        success_count:
          type: integer
        skip_count:
          type: integer
        fail_count:
          type: integer
        rows:
          type: array
          items:
            type: object
    ImportJobStatusResult:
      allOf:
        - $ref: '#/components/schemas/ImportConfirmResult'
        - type: object
          required: [job_id, status, total_rows, processed_rows]
          properties:
            job_id:
              type: string
            status:
              type: string
              enum: [running, succeeded, failed]
            total_rows:
              type: integer
            processed_rows:
              type: integer
            error_code:
              type: string
              nullable: true
    GenerateShortcutRequest:
      type: object
      properties:
        name:
          type: string
          default: Xledger quick add
          description: PAT name shown in the token list
        expires_in:
          type: integer
          description: Token lifetime in days
        default_ledger_id:
          type: string
          description: Ledger bound to the imported shortcut
        default_account_id:
          type: string
          nullable: true
          description: Optional default account bound to the shortcut
        mode:
          type: string
          enum: [manual, ocr_confirm]
          default: manual
          description: Shortcut workflow mode
    GenerateShortcutResponse:
      type: object
      required: [pat_token, api_endpoint]
      properties:
        shortcut_id:
          type: string
          description: Server generated shortcut binding ID
        pat_token:
          type: string
          description: PAT token (only shown once at creation)
          example: pat:user123:pat-1
        api_endpoint:
          type: string
          description: API base URL for the shortcut
          example: https://api.example.com
        install_url:
          type: string
          description: Apple Shortcuts import URL when available
        qr_url:
          type: string
          description: Optional QR code URL for installing the shortcut
        default_ledger_id:
          type: string
          description: Ledger bound to the shortcut
        default_account_id:
          type: string
          nullable: true
          description: Account bound to the shortcut
        shortcut_url:
          type: string
          description: Deep link URL for Apple Shortcuts
          example: shortcuts://run-shortcut?name=蹇嵎璁拌处
        expires_at:
          type: string
          format: date-time
          nullable: true
    QuickAddSuggestion:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        reason:
          type: string
        confidence:
          type: number
          format: double
    QuickAddPreviewRequest:
      type: object
      required: [raw_text]
      properties:
        shortcut_id:
          type: string
        raw_text:
          type: string
          description: OCR text produced locally by Apple Shortcuts
        source:
          type: string
          example: ios_shortcuts_ocr
        idempotency_key:
          type: string
        default_ledger_id:
          type: string
        default_account_id:
          type: string
          nullable: true
    QuickAddPreviewResponse:
      type: object
      required: [amount, type, memo, occurred_at, needs_review]
      properties:
        shortcut_id:
          type: string
        amount:
          type: number
          format: double
        type:
          type: string
          enum: [expense, income]
        memo:
          type: string
        occurred_at:
          type: string
          format: date-time
        category_suggestion:
          $ref: '#/components/schemas/QuickAddSuggestion'
        ledger_suggestions:
          type: array
          items:
            $ref: '#/components/schemas/QuickAddSuggestion'
        account_suggestions:
          type: array
          items:
            $ref: '#/components/schemas/QuickAddSuggestion'
        needs_review:
          type: boolean
    QuickAddConfirmRequest:
      type: object
      required: [ledger_id, type, amount]
      properties:
        shortcut_id:
          type: string
        idempotency_key:
          type: string
        ledger_id:
          type: string
        account_id:
          type: string
          nullable: true
        category_id:
          type: string
          nullable: true
        type:
          type: string
          enum: [expense, income]
        amount:
          type: number
          format: double
          minimum: 0.01
        memo:
          type: string
        occurred_at:
          type: string
          format: date-time
    QuickAddConfirmResponse:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        amount:
          type: number
          format: double
        type:
          type: string
          enum: [expense, income]
    QuickAddV2Request:
      type: object
      required: [amount, type]
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 50.00
        type:
          type: string
          enum: [expense, income]
          example: expense
        category:
          type: string
          description: Category name (without emoji prefix)
          example: 椁愰ギ
        memo:
          type: string
          example: 鍗堥
    QuickAddV2Response:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        type:
          type: string
          enum: [expense, income]
        memo:
          type: string
          nullable: true
        success:
          type: boolean
    QuickAddCategoriesResponse:
      type: object
      required: [categories]
      properties:
        categories:
          type: array
          items:
            type: string
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    LedgerIDParam:
      name: ledger_id
      in: query
      schema:
        type: string
        format: uuid
    AccountIDParam:
      name: account_id
      in: query
      schema:
        type: string
        format: uuid
    CategoryIDParam:
      name: category_id
      in: query
      schema:
        type: string
        format: uuid
    TagIDParam:
      name: tag_id
      in: query
      schema:
        type: string
        format: uuid
    DateFromParam:
      name: date_from
      in: query
      schema:
        type: string
        format: date-time
    DateToParam:
      name: date_to
      in: query
      schema:
        type: string
        format: date-time
    FromParam:
      name: from
      in: query
      schema:
        type: string
        format: date-time
    ToParam:
      name: to
      in: query
      schema:
        type: string
        format: date-time
paths:
  /auth/send-code:
    post:
      summary: 鍙戦€侀偖绠遍獙璇佺爜
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Verification code sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '429':
          description: 瑙﹀彂闄愭祦
  /auth/verify-code:
    post:
      summary: Verify code login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: 鐧诲綍鎴愬姛
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenPair'
        '401':
          description: Verification code invalid or expired
  /auth/refresh:
    post:
      summary: 鍒锋柊 Access Token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 鍒锋柊鎴愬姛
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenPair'
  /auth/logout:
    post:
      summary: Logout
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out
  /auth/me:
    get:
      summary: 鑾峰彇褰撳墠鐢ㄦ埛淇℃伅
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 鐢ㄦ埛淇℃伅
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
  /ledgers:
    get:
      summary: 鑾峰彇璐︽湰鍒楄〃
      tags: [Ledgers]
      security:
        - BearerAuth: []
        - PATAuth: []
      responses:
        '200':
          description: 璐︽湰鍒楄〃
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
    post:
      summary: 鍒涘缓璐︽湰
      tags: [Ledgers]
      security:
        - BearerAuth: []
        - PATAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                is_default:
                  type: boolean
                  default: false
      responses:
        '201':
          description: 鍒涘缓鎴愬姛
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Ledger'
  /ledgers/{id}:
    patch:
      summary: 鏇存柊璐︽湰
      tags: [Ledgers]
      security:
        - BearerAuth: []
        - PATAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: 鏇存柊鎴愬姛
    delete:
      summary: 鍒犻櫎璐︽湰
      tags: [Ledgers]
      security:
        - BearerAuth: []
        - PATAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 鍒犻櫎鎴愬姛
        '409':
          description: 榛樿璐︽湰涓嶅彲鍒犻櫎
  /accounts:
    get:
      summary: 鑾峰彇璐︽埛鍒楄〃
      tags: [Accounts]
      security:
        - BearerAuth: []
        - PATAuth: []
      responses:
        '200':
          description: 璐︽埛鍒楄〃
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
    post:
      summary: 鍒涘缓璐︽埛
      tags: [Accounts]
      security:
        - BearerAuth: []
        - PATAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, initial_balance]
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [debit, credit, cash, ewallet]
                initial_balance:
                  type: number
                  format: double
      responses:
        '201':
          description: 鍒涘缓鎴愬姛
  /accounts/{id}:
    get:
      summary: 鑾峰彇璐︽埛璇︽儏
      tags: [Accounts]
      security:
        - BearerAuth: []
        - PATAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 璐︽埛璇︽儏
    patch:
      summary: 鏇存柊璐︽埛
      tags: [Accounts]
      security:
        - BearerAuth: []
        - PATAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [debit, credit, cash, ewallet]
                archived:
                  type: boolean
      responses:
        '200':
          description: 鏇存柊鎴愬姛
    delete:
      summary: 鍒犻櫎璐︽埛
      tags: [Accounts]
      security:
        - BearerAuth: []
        - PATAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 鍒犻櫎鎴愬姛
  /transactions:
    get:
      summary: 鑾峰彇浜ゆ槗鍒楄〃
      tags: [Transactions]
      security:
        - BearerAuth: []
        - PATAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/LedgerIDParam'
        - $ref: '#/components/parameters/AccountIDParam'
        - $ref: '#/components/parameters/CategoryIDParam'
        - $ref: '#/components/parameters/TagIDParam'
        - $ref: '#/components/parameters/DateFromParam'
        - $ref: '#/components/parameters/DateToParam'
      responses:
        '200':
          description: 浜ゆ槗鍒楄〃
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
    post:
      summary: 鍒涘缓浜ゆ槗
      tags: [Transactions]
      security:
        - BearerAuth: []
        - PATAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ledger_id, type, amount]
              properties:
                ledger_id:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [income, expense, transfer]
                amount:
                  type: number
                  format: double
                  minimum: 0.01
                account_id:
                  type: string
                  format: uuid
                  nullable: true
                category_id:
                  type: string
                  format: uuid
                  nullable: true
                tag_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                from_account_id:
                  type: string
                  format: uuid
                  nullable: true
                to_account_id:
                  type: string
                  format: uuid
                  nullable: true
                occurred_at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: 鍒涘缓鎴愬姛
  /transactions/review-summary:
    get:
      summary: 鑾峰彇浜ゆ槗澶嶆牳鎽樿
      tags: [Transactions]
      security:
        - BearerAuth: []
        - PATAuth: []
      parameters:
        - $ref: '#/components/parameters/LedgerIDParam'
        - $ref: '#/components/parameters/AccountIDParam'
        - $ref: '#/components/parameters/CategoryIDParam'
        - $ref: '#/components/parameters/TagIDParam'
        - $ref: '#/components/parameters/DateFromParam'
        - $ref: '#/components/parameters/DateToParam'
      responses:
        '200':
          description: 澶嶆牳鎽樿
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TransactionReviewSummary'
  /transactions/review-items:
    get:
      summary: 鑾峰彇浜ゆ槗澶嶆牳闃熷垪
      tags: [Transactions]
      security:
        - BearerAuth: []
        - PATAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/LedgerIDParam'
        - $ref: '#/components/parameters/AccountIDParam'
        - $ref: '#/components/parameters/CategoryIDParam'
        - $ref: '#/components/parameters/TagIDParam'
        - $ref: '#/components/parameters/DateFromParam'
        - $ref: '#/components/parameters/DateToParam'
        - name: reason
          in: query
          schema:
            type: string
