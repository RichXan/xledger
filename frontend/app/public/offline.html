<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xledger offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Inter", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 10% 10%, #dceaff, #edf3fc 40%, #f7faff 100%);
        color: #0f172a;
      }
      .card {
        width: min(92vw, 480px);
        background: #ffffff;
        border: 1px solid #d9e2ef;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(4, 30, 80, 0.12);
        padding: 24px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        margin: 12px 0 0;
        font-size: 15px;
        color: #475569;
      }
      button {
        margin-top: 18px;
        height: 42px;
        padding: 0 16px;
        border-radius: 10px;
        border: none;
        background: #00327d;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>xledger cached shell is available, but live data APIs require network. Please reconnect and retry.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
